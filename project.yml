name: DoINeedSunscreen
options:
  bundleIdPrefix: com.sunscreenfyi
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  DoINeedSunscreen:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunscreenfyi.DoINeedSunscreen
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: App/DoINeedSunscreen.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "Do I Need Sunscreen?"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: "com.sunscreenfyi.DoINeedSunscreen.refreshNotification"
        INFOPLIST_KEY_UIBackgroundModes: "fetch"
    entitlements:
      path: App/DoINeedSunscreen.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sunscreenfyi.shared
        com.apple.developer.weatherkit: true
    dependencies:
      - target: SunscreenWidgetExtension

  SunscreenWidgetExtension:
    type: app-extension
    supportedDestinations: [iOS]
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunscreenfyi.DoINeedSunscreen.SunscreenWidget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/SunscreenWidgetExtension.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: "Sunscreen Widget"
    entitlements:
      path: Widget/SunscreenWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sunscreenfyi.shared
        com.apple.developer.weatherkit: true

  SunscreenWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
        excludes:
          - "Widget/**"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunscreenfyi.DoINeedSunscreen.watch
        CODE_SIGN_ENTITLEMENTS: Watch/SunscreenWatch.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.sunscreenfyi.DoINeedSunscreen
        INFOPLIST_KEY_CFBundleDisplayName: "Sunscreen"
    entitlements:
      path: Watch/SunscreenWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sunscreenfyi.shared
        com.apple.developer.weatherkit: true
    dependencies:
      - target: SunscreenWatchWidget

  SunscreenWatchWidget:
    type: app-extension
    platform: watchOS
    sources:
      - path: Watch/Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sunscreenfyi.DoINeedSunscreen.watch.widget
        INFOPLIST_FILE: Watch/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Watch/SunscreenWatch.entitlements
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: "Sunscreen"
    entitlements:
      path: Watch/SunscreenWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sunscreenfyi.shared
        com.apple.developer.weatherkit: true
